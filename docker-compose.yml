services:
  db:
    image: postgres:17-alpine
    container_name: ecotrack-db
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-ecotrack}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-ecotrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ecotrack-backend:latest
    container_name: ecotrack-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/resumo"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  seed:
    image: ecotrack-backend:latest
    container_name: ecotrack-seed
    restart: "no"
    env_file:
      - backend/.env
    environment:
      DB_HOST: db
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["/app/backend/.venv/bin/python", "/app/backend/seeds/run.py"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ecotrack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pg_data:
